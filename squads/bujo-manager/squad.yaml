name: "BuJo Manager"
code: "bujo-manager"
description: "Gerencia o Bullet Journal digital integrado ao PARA. Cria daily logs, processa inbox, migra tarefas, classifica pela Matriz de Eisenhower, e faz revisões semanais."
version: "1.0.0"

locking: false

pipeline: pipeline/pipeline.yaml
party: squad-party.csv

triggers:
  - "bujo"
  - "daily log"
  - "tarefas de hoje"
  - "processar inbox"
  - "revisão semanal"

output_dir: "squads/bujo-manager/output"
