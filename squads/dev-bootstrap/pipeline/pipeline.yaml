name: "Pipeline — Dev Bootstrap"
squad: "dev-bootstrap"
version: "1.0.0"

steps:
  - step: 1
    name: "checkpoint-input"
    file: "steps/step-01-checkpoint-input.md"
    type: checkpoint

  - step: 2
    name: "market-research"
    file: "steps/step-02-market-research.md"
    agent: "dev-bootstrap/agents/pablo-pesquisa"
    execution: subagent
    optional: true

  - step: 3
    name: "fetch-docs"
    file: "steps/step-03-fetch-docs.md"
    agent: "dev-bootstrap/agents/diana-docs"
    execution: subagent

  - step: 4
    name: "analyze-and-plan"
    file: "steps/step-04-analyze-and-plan.md"
    agent: "dev-bootstrap/agents/andre-arquitetura"
    execution: inline

  - step: 5
    name: "checkpoint-plan-approval"
    file: "steps/step-05-checkpoint-plan-approval.md"
    type: checkpoint

  - step: 6
    name: "execute-bootstrap"
    file: "steps/step-06-execute-bootstrap.md"
    agent: "dev-bootstrap/agents/bruno-bootstrap"
    execution: inline

  - step: 7
    name: "test-suite"
    file: "steps/step-07-test-suite.md"
    agent: "dev-bootstrap/agents/tiago-testes"
    execution: inline

  - step: 8
    name: "review-project"
    file: "steps/step-08-review-project.md"
    agent: "dev-bootstrap/agents/victor-validacao"
    execution: inline

  - step: 9
    name: "checkpoint-delivery"
    file: "steps/step-09-checkpoint-delivery.md"
    type: checkpoint

checkpoints:
  - step: 1
    name: "Input e Parametros"
  - step: 5
    name: "Aprovacao do Plano SDD"
  - step: 9
    name: "Entrega Final"
