# Design output — generated by Design phase

squad:
  code: "overmind-carrossel"
  name: "Overmind Carrosséis"
  description: "Squad de criação e publicação de carrosséis Instagram para a marca Overmind"

agents:
  - id: "squads/overmind-carrossel/agents/researcher"
    name: "Nico Notícia"
    title: "Pesquisador de Tendências"
    icon: "🔍"
    execution: "subagent"
    role_summary: "Encontra notícias e tendências de IA relevantes para a Overmind"
    skills: [web_search, web_fetch]
    tasks:
      - name: "find-and-rank-news"
        file: "tasks/find-and-rank-news.md"
        description: "Pesquisa notícias de IA e rankeia por relevância"

  - id: "squads/overmind-carrossel/agents/creator"
    name: "Clara Carrossel"
    title: "Criadora de Carrosséis Instagram"
    icon: "🎠"
    execution: "inline"
    role_summary: "Gera ângulos e cria carrosséis completos (copy + slides visuais HTML)"
    skills: [image-creator]
    tasks:
      - name: "generate-angles"
        file: "tasks/generate-angles.md"
        description: "Gera 5 ângulos distintos a partir da notícia selecionada"
      - name: "create-instagram-feed"
        file: "tasks/create-instagram-feed.md"
        description: "Cria o carrossel completo: copy + design HTML + caption"

  - id: "squads/overmind-carrossel/agents/reviewer"
    name: "Rui Revisão"
    title: "Revisor de Qualidade"
    icon: "✅"
    execution: "inline"
    role_summary: "Avalia conteúdo contra critérios de qualidade e emite APPROVE/REJECT"
    skills: []
    tasks:
      - name: "review"
        file: "tasks/review.md"
        description: "Avalia carrossel contra critérios de copy, design e brand voice"

pipeline:
  - step: 1
    name: "research-focus"
    type: "checkpoint"
    output_file: "squads/overmind-carrossel/output/research-focus.md"
  - step: 2
    name: "research"
    type: "agent"
    agent: "researcher"
    execution: "subagent"
    input_file: "squads/overmind-carrossel/output/research-focus.md"
    output_file: "squads/overmind-carrossel/output/research-results.md"
    model_tier: "powerful"
  - step: 3
    name: "news-selection"
    type: "checkpoint"
  - step: 4
    name: "generate-angles"
    type: "agent"
    agent: "creator"
    execution: "inline"
    input_file: "squads/overmind-carrossel/output/research-results.md"
    output_file: "squads/overmind-carrossel/output/angles.md"
  - step: 5
    name: "angle-selection"
    type: "checkpoint"
  - step: 6
    name: "create-carousel"
    type: "agent"
    agent: "creator"
    execution: "inline"
    format: "instagram-feed"
    input_file: "squads/overmind-carrossel/output/angles.md"
    output_file: "squads/overmind-carrossel/output/carousel-content.md"
  - step: 7
    name: "content-approval"
    type: "checkpoint"
  - step: 8
    name: "review"
    type: "agent"
    agent: "reviewer"
    execution: "inline"
    input_file: "squads/overmind-carrossel/output/carousel-content.md"
    output_file: "squads/overmind-carrossel/output/review-result.md"
    on_reject: 6
  - step: 9
    name: "final-approval"
    type: "checkpoint"
  - step: 10
    name: "publish"
    type: "skill"
    skill: "instagram-publisher"
    input_file: "squads/overmind-carrossel/output/carousel-content.md"

investigation:
  enriched: false

skills_installed:
  - web_search
  - web_fetch

skills_to_create:
  - image-creator
  - instagram-publisher

formats_selected:
  - instagram-feed

best_practices_consulted:
  - copywriting.md
  - instagram-feed.md
  - review.md
  - image-design.md
  - social-networks-publishing.md

template_selection: skipped
