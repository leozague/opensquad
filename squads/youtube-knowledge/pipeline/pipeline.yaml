name: "Pipeline — YouTube Knowledge Extractor"
squad: "youtube-knowledge"
version: "1.0.0"

steps:
  - step: 1
    name: "checkpoint-url-video"
    file: "steps/step-01-checkpoint-url.md"
    type: checkpoint

  - step: 2
    name: "extracao-video"
    file: "steps/step-02-extracao.md"
    agent: "youtube-knowledge/agents/teo-transcritor"
    execution: subagent
    model_tier: fast

  - step: 3
    name: "checkpoint-validar-transcricao"
    file: "steps/step-03-checkpoint-transcricao.md"
    type: checkpoint

  - step: 4
    name: "sintese-conhecimento"
    file: "steps/step-04-sintese.md"
    agent: "youtube-knowledge/agents/sofia-sintese"
    execution: inline

  - step: 5
    name: "checkpoint-aprovar-conteudo"
    file: "steps/step-05-checkpoint-conteudo.md"
    type: checkpoint

  - step: 6
    name: "revisao-qualidade"
    file: "steps/step-06-revisao.md"
    agent: "youtube-knowledge/agents/rita-revisao"
    execution: inline
    on_reject: 4

  - step: 7
    name: "checkpoint-aprovacao-final"
    file: "steps/step-07-checkpoint-final.md"
    type: checkpoint

checkpoints:
  - step: 1
    name: "URL do Video"
  - step: 3
    name: "Validar Transcricao"
  - step: 5
    name: "Aprovar Conteudo"
  - step: 7
    name: "Aprovacao Final"
